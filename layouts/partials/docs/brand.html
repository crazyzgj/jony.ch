<a class="flex align-center" href="{{ .Site.BaseURL | relLangURL }}"
  style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
  {{- if .Site.Params.BookLogo -}}
  <img src="{{ .Site.Params.BookLogo | relURL }}" alt="Logo" class="book-icon"
    style="height: 3rem; width: auto; transition: transform 0.3s ease; object-fit: contain; padding: 0.3rem; background-color: #f1f5f9; border: 2px solid #f1f5f9; border-radius: 8px;"
    onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'" />
  {{- else -}}
  <img src="{{ " logo.svg" | relURL }}" alt="Logo" class="book-icon"
    style="height: 3rem; width: auto; transition: transform 0.3s ease; object-fit: contain; padding: 0.3rem; background-color: #f1f5f9; border: 2px solid #f1f5f9; border-radius: 8px;"
    onmouseover="this.style.transform='scale(1.08)'" onmouseout="this.style.transform='scale(1)'" />
  {{- end -}}
  <span style="font-weight: 800; font-size: 1.4rem; color: #102a43; letter-spacing: -0.5px;">{{ .Site.Title }}</span>
</a>
